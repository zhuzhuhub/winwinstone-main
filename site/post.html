<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting Article | Win-Win Stone</title>
    <meta name="robots" content="noindex,follow">
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("slug");
        const baseHref =
          window.location.origin && window.location.origin !== "null"
            ? `${window.location.origin}/`
            : window.location.href.replace(/[^/]*$/, "");
        const target = new URL(slug ? `blog/${encodeURIComponent(slug)}/` : "blog.html", baseHref);
        window.location.replace(target.href);
      })();
    </script>
  </head>
  <body>
    <main style="padding: 3rem; font-family: Arial, sans-serif;">
      <p>Redirecting to the latest article page...</p>
      <p><a href="blog.html">Back to blog</a></p>
    </main>
  </body>
</html>
